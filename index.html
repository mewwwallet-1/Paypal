<!DOCTYPE html>
<html>
<head>
  <title>PayPal</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #003087, #009cde);
      height: 100vh;
    }

    .container {
      background: white;
      color: black;
      width: 100%;
      height: 100vh;
      padding: 25px;
      box-sizing: border-box;
      text-align: center;
    }

    .logo {
      width: 150px; /* slightly bigger */
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 15px;
      margin: 15px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    button {
      padding: 15px;
      width: 100%;
      background: #0070ba;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 18px;
      cursor: pointer;
    }

    button:hover {
      background: #005ea6;
    }

    #box {
      display: none;
      margin-top: 20px;
      background: #f5f7fa;
      padding: 20px;
      border-radius: 10px;
    }

    #request {
      color: #0070ba;
      cursor: pointer;
      margin-top: 10px;
    }

    #loader {
      display: none;
      margin-top: 20px;
    }

    .spinner {
      border: 4px solid #eee;
      border-top: 4px solid #0070ba;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: auto;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .fade {
      animation: fadeIn 1s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .small-text {
      font-size: 14px;
      margin-top: 15px;
    }
  </style>
</head>

<body>

  <div class="container">

    <img src="https://www.paypalobjects.com/webstatic/icon/pp258.png" class="logo">

    <h2>Welcome Aris Groenendijk</h2>

    <p id="transactionText" style="display:none;" class="fade">
      Incoming transaction of €11,828
    </p>

    <div id="loader">
      <p>Processing incoming payment...</p>
      <div class="spinner"></div>
    </div>

    <h3>Enter Code</h3>

    <input type="text" id="codeBox" placeholder="Enter code">

    <button onclick="checkCode()">Submit</button>

    <p id="result"></p>
    <p id="request"></p>

    <div id="box">
      <h3>
        Transaction not completed due to limit on your account (arisschuurtje@gmail.com)
        We need to upgrade it with 500€, for a completed transaction before 30th
      </h3>
      <p>Your balance: €11,828</p>
    </div>

  </div>

  <script>
    window.onload = function() {
      document.getElementById("loader").style.display = "block";

      setTimeout(() => {
        document.getElementById("loader").style.display = "none";
        document.getElementById("transactionText").style.display = "block";
      }, 2500);
    }

    function checkCode() {
      let code = document.getElementById("codeBox").value;

      if (code === "8421") {
        document.getElementById("result").innerText = "Correct code ✅";
        document.getElementById("request").innerText = "";
        document.getElementById("box").style.display = "block";
      } else {
        document.getElementById("result").innerText = "Wrong code ❌";
        document.getElementById("request").innerHTML = "<u>Request new code</u>";
      }
    }
  </script>

</body>
</html>
